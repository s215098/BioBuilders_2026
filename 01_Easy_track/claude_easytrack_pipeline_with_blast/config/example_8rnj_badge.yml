# ============================================================
#  EasyTrack Pipeline — Configuration File
#  Example: Unspecific Peroxygenase (8RNJ) + BADGE ligand
# ============================================================
#
#  Usage:
#    bash run_pipeline.sh config/example_8rnj_badge.yml
#
#  Or run individual steps:
#    python pipeline/01_fetch_sequences.py --config config/example_8rnj_badge.yml
# ============================================================

# Where all outputs are written (relative to project root)
output_dir: "results/8rnj_badge"

# ─────────────────────────────────────────
# STEP 1 — Sequence Retrieval
# ─────────────────────────────────────────
sequences:
  # Mode options:
  #   "ncbi"    → search NCBI protein database by query string
  #   "uniprot" → search UniProt by keyword / family
  #   "manual"  → skip download, use a FASTA you already have
  mode: "ncbi"

  # Query string (used for ncbi and uniprot modes)
  query: "unspecific peroxygenase"

  # NCBI-specific settings
  ncbi_email: "your.email@example.com"   # Required by NCBI — put your real email here
  ncbi_database: "protein"               # "protein", "nr", etc.
  max_results: 200

  # UniProt-specific settings
  uniprot_reviewed_only: false           # true = Swiss-Prot only (higher quality, fewer hits)

  # Manual mode: path to your own FASTA file (absolute or relative to project root)
  manual_fasta: ""

# ─────────────────────────────────────────
# STEP 2 — MSA + Phylogenetic Tree
# ─────────────────────────────────────────
phylogeny:
  # MAFFT alignment strategy. Options: "--auto", "--linsi", "--ginsi", "--einsi"
  # "--auto" is recommended for most cases.
  mafft_args: "--auto"

  # Tree method: "fasttree" (recommended) or "nj" (fallback — no binary needed)
  tree_method: "fasttree"

# ─────────────────────────────────────────
# STEP 3 — Representative Selection
# ─────────────────────────────────────────
selection:
  # Distance threshold for grouping sequences into clusters
  # Lower = more clusters = more representatives picked
  # Typical range: 0.3 – 0.8 (tree branch-length units)
  cluster_threshold: 0.5

  # Selection mode:
  #   "auto"   → one representative per cluster is picked automatically
  #   "manual" → pipeline pauses and shows you the clusters to edit
  mode: "auto"

# ─────────────────────────────────────────
# STEP 4 — Receptor Preparation
# ─────────────────────────────────────────
receptor:
  # PDB ID to download from RCSB (e.g. "8RNJ")
  # Leave empty if you are providing a local file instead.
  pdb_id: "8RNJ"

  # Path to a local PDB file (leave empty if using pdb_id above)
  local_pdb: ""

  # Which chains to keep. Use [] to keep ALL chains.
  # Example: ["A"] keeps only chain A
  chains_to_keep: ["A"]

  # pH used for adding hydrogens (affects protonation state of titratable residues)
  ph: 7.4

# ─────────────────────────────────────────
# STEP 5 — Ligand
# ─────────────────────────────────────────
ligand:
  # Common name used to search PubChem (e.g. "BADGE", "BPA", "bisphenol A")
  name: "BADGE"

  # PubChem CID (optional — if provided, skips the name search step)
  # BADGE = 2286
  pubchem_cid: 2286

  # Path to a local SDF file — if provided, skips PubChem download entirely
  local_sdf: ""

# ─────────────────────────────────────────
# STEP 6 — Molecular Docking (AutoDock Vina)
# ─────────────────────────────────────────
docking:
  # Three modes available:
  #
  #  "blind"    → search box covers the entire receptor. No prior knowledge needed.
  #               Slowest but most unbiased.
  #
  #  "targeted" → search box centred on exact coordinates you provide.
  #               Use when you have Å coordinates from a crystal structure.
  #
  #  "residues" → search box centred on named active-site residues.
  #               Specify residue names/numbers from the literature and the
  #               script calculates the centre automatically.
  #               Best when the binding site is known but you don't have coordinates.
  mode: "blind"

  # ── targeted mode ────────────────────────────────────────────
  # Coordinates of the box centre (X Y Z), in Angstroms.
  # Find these in PyMOL: click an active site atom, read coordinates from
  # the bottom toolbar.
  center: []        # e.g. [18.8, 32.2, 14.9]

  # ── residues mode ────────────────────────────────────────────
  # Active site residues to centre the box on.
  # Accepts: residue names ("HEM"), name+number ("HIS86"), or just numbers (86).
  # For UPOs: the active site is around the heme group and the proximal cysteine.
  # For laccases: the T1 copper site (e.g. His residues coordinating the copper).
  active_site_residues: []
  # Examples:
  #   UPO active site:     ["HEM", "CYS36", "HIS86", "ARG189"]
  #   Laccase T1 copper:   ["HIS395", "HIS447", "HIS452", "CYS450"]

  # ── shared settings ──────────────────────────────────────────
  # Box size in Angstroms (used for targeted and residues modes).
  # 20 Å is a good default for most small-molecule active sites.
  box_size: [20.0, 20.0, 20.0]

  # Search exhaustiveness — higher = more thorough but slower
  # 8 = quick test | 32 = standard | 64 = thorough
  exhaustiveness: 32

  # Number of binding poses to save
  n_poses: 10

# ─────────────────────────────────────────
# STEP 6b — Boltz-2 + Targeted Vina (optional)
# ─────────────────────────────────────────
# Requires: pip install boltz
# Set enabled: true to run this step.
# Boltz predicts the protein-ligand complex from sequence alone (no PDB needed),
# extracts the predicted pocket center, then runs targeted Vina docking.
# This gives both an AI affinity score (log10 IC50) and a physics-based
# binding affinity (kcal/mol) in one step.
boltz:
  enabled: false

  # Full amino acid sequence of the protein (single-letter, no spaces/newlines)
  # For 8RNJ (Marasmius wettsteinii UPO), paste the sequence from UniProt here.
  sequence: ""

  # SMILES string of the ligand (used by Boltz for AI prediction)
  # BADGE: C(OCC1CO1)(c1ccc(C(C)(C)c2ccc(OCC3CO3)cc2)cc1)=O is incorrect —
  # use the canonical SMILES from PubChem CID 2286.
  smiles: "CC(C)(c1ccc(OCC2CO2)cc1)c1ccc(OCC2CO2)cc1"

  # Boltz confidence threshold (0.0–1.0).
  # Runs below this threshold skip the Vina re-docking stage.
  confidence_threshold: 0.60
