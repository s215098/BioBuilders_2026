name: easytrack
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Core Python ──────────────────────────────────────────────
  # Python 3.12 is required — vina 1.2.7 has pre-built wheels for 3.12
  # but not reliably for 3.10/3.11
  - python=3.12

  # ── Data / analysis ──────────────────────────────────────────
  - numpy
  - pandas
  - scipy
  - matplotlib

  # ── Bioinformatics ───────────────────────────────────────────
  - biopython>=1.80      # Entrez, SeqIO, Phylo, AlignIO

  # ── External alignment + tree binaries ───────────────────────
  - mafft                # Multiple sequence alignment (Step 2)
  - fasttree             # Maximum-likelihood phylogenetic tree (Step 2)

  # ── Structural biology / receptor prep ───────────────────────
  - pdbfixer             # PDB cleaning + hydrogen addition (Step 4)
  - openmm               # Required by pdbfixer
  - openbabel            # PDB → PDBQT conversion (Step 4)

  # ── Build dependencies for vina Python bindings ──────────────
  # These must be installed before pip install vina
  - swig
  - boost-cpp

  # ── Utilities ────────────────────────────────────────────────
  - requests             # HTTP downloads (NCBI, UniProt, PubChem, RCSB)
  - pyyaml               # Config file parsing
  - tqdm                 # Progress bars
  - pip

  - gemmi                # Required by meeko 0.7.1

# ── pip-only packages ─────────────────────────────────────────
# NOTE: vina must be installed AFTER activating the env and exporting
# BOOST paths. See README.md Installation section for the full sequence.
# Do NOT run `conda env create` and expect vina to install automatically —
# the BOOST_INCLUDE/BOOST_LIB exports are required first.
#
# Run manually after `conda env create && conda activate easytrack`:
#
#   export BOOST_INCLUDE=$CONDA_PREFIX/include
#   export BOOST_LIB=$CONDA_PREFIX/lib
#   pip install vina==1.2.7 meeko==0.7.1 rdkit==2025.9.3
#
# For Step 6b (Boltz-2), install separately (large download, ~2 GB model):
#   pip install boltz
